name: Supabase Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg dnsutils lsb-release

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg

          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Check PostgreSQL Versions
        run: |
          echo "=== psql ==="
          psql --version

          echo "=== pg_dump ==="
          pg_dump --version

      - name: Debug Database Config
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
        run: |
          echo "=== Database Config ==="
          echo "HOST: $DB_HOST"
          echo "PORT: $DB_PORT"
          echo "DATABASE: $DB_NAME"
          echo "USER LENGTH: ${#DB_USER}"

      - name: Check DNS
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          echo "=== DNS Lookup ==="
          nslookup "$DB_HOST" || true

          echo ""
          echo "=== IPv4 ==="
          dig A "$DB_HOST" +short || true

          echo ""
          echo "=== IPv6 ==="
          dig AAAA "$DB_HOST" +short || true

      - name: Test PostgreSQL Connection
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGPORT: ${{ secrets.DB_PORT }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "=== Testing PostgreSQL ==="

          psql -c "
            SELECT 
              current_user,
              current_database(),
              version();
          "

      - name: Create Database Backup
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGPORT: ${{ secrets.DB_PORT }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "=== Creating Backup ==="

          pg_dump \
            --no-owner \
            --no-privileges \
            --format=custom \
            --file=backup.dump

          echo "=== Backup File ==="
          ls -lh backup.dump

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-postgres-backup
          path: backup.dump
