name: Supabase Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils

      - name: Debug Configuration
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
        run: |
          echo "=== Database Config ==="
          echo "HOST: $DB_HOST"
          echo "PORT: $DB_PORT"
          echo "DATABASE: $DB_NAME"
          echo "USER: $DB_USER"

          echo ""
          echo "=== User Length ==="
          echo "${#DB_USER}"

      - name: Check DNS
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          echo "=== DNS Lookup ==="
          nslookup "$DB_HOST" || true

          echo ""
          echo "=== IPv4 ==="
          dig A "$DB_HOST" +short || true

          echo ""
          echo "=== IPv6 ==="
          dig AAAA "$DB_HOST" +short || true

      - name: Test PostgreSQL Connection
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGPORT: ${{ secrets.DB_PORT }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "=== Testing PostgreSQL ==="
          psql -c "SELECT current_user, current_database(), version();"

      - name: Create Database Backup
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGPORT: ${{ secrets.DB_PORT }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "=== Creating Backup ==="

          pg_dump \
            --no-owner \
            --no-privileges \
            > backup.sql

          echo "Backup size:"
          ls -lh backup.sql

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: supabase-database-backup
          path: backup.sql
